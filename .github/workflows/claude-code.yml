name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Give the bot what it needs (and allow OIDC).
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    # Either remove job-level permissions entirely (recommended), or
    # if you keep them, INCLUDE id-token: write, and use write for contents so it can comment/commit.
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude PR Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # This lets the action proceed even when OIDC isn't available (e.g., forked PRs).
          github_token: ${{ github.token }}

          # Optional triggers – pick one or both depending on your desired workflow.
          # Add this label to a PR to kick off a review:
          label_trigger: 'claude'
          # Or have reviewers write this phrase in a PR comment to start a review:
          trigger_phrase: '@claude review'

          # Guidance for the review. Use 'prompt' to express goals and constraints.
          prompt: |
            You are reviewing changes for the RDX (Risk Data Exchange) project in automotive cybersecurity.
            Priorities:
            - Check alignment with ISO/SAE 21434 practices where applicable (naming, traceability, documentation).
            - Validate schema and data model consistency (CycloneDX embedding compatibility must be preserved).
            - Identify backward-compatibility risks and migration notes if schemas change.
            - Call out risk to downstream tooling (parsers, exporters, dashboards).
            - Provide specific, actionable diffs or code suggestions where possible.

          # Optional advanced config (JSON). Use to tweak action behavior.
          # For example, you can nudge verbosity or model arguments here.
          # settings: |
          #   {
          #     "review_verbosity": "balanced",
          #     "max_changed_files": 200
          #   }

          # Optional niceties:
          use_sticky_comment: true        # keeps one top-level comment updated
          branch_prefix: 'claude/'        # if the bot ever needs to create branches/PRs
          track_progress: true            # emits progress logs

name: Claude – PR Apply (Manual)

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: claude-pr-apply-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    if: >
      github.actor != 'claude[bot]' &&
      github.actor != 'github-actions[bot]' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'issue_comment' &&
         github.event.issue.pull_request != null &&
         contains(github.event.comment.body, '@claude apply')) ||
        (github.event_name == 'pull_request' &&
         contains(join(github.event.pull_request.labels.*.name, ','), 'claude-apply'))
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for safe commits/reverts)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Apply Changes
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY_RDX }}
          github_token: ${{ github.token }}
          allowed_bots: 'claude[bot]'
          use_sticky_comment: true
          track_progress: true
          branch_prefix: 'claude/fixes/'
          settings: |
            {
              "review_verbosity": "concise",
              "max_changed_files": 100,
              "max_diff_bytes": 600000,
              "fail_if_no_diff": true
            }
          prompt: |
            Apply targeted changes that address acknowledged review feedback in THIS PR.
            Scope:
            - Modify only files in this PR unless a tiny adjacent edit is strictly required.
            - Keep commits small and well-titled; avoid refactors.
            - Update/add tests/docs if behavior changes.
            Safeguards:
            - If instructions are ambiguous or risky, ask for clarification with a PR comment instead of committing.
            - Preserve security properties; never introduce secrets or weaken checks.

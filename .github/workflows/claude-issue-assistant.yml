# ============================================================================
# Claude Code Issue Assistant
# ============================================================================
# Description: Automated issue management using Claude Code AI assistant
#              Available to ALL users with repository access
# 
# Triggers:
#   - New issue creation (issues.opened)
#   - New comments on existing issues (issue_comment.created)
#
# User Access:
#   - Repository collaborators and members: ✅ Full access
#   - External contributors (public repos): ✅ Can trigger via issue comments
#   - Anonymous users: ❌ Must have GitHub account with repo access
#
# How to Use:
#   NEW ISSUES: Claude automatically responds to all new issues
#   COMMENTS: Mention @claude in comments to invoke assistance
#
# Example Usage:
#   - Create issue: "Can you explain the RDX schema structure?" (auto-responds)
#   - Comment: "@claude Review this proposed change for ISO 21434 compliance"
#   - Comment: "@claude What are the requirements for CAL/TAF integration?"
#
# Capabilities:
#   - Answer questions about the RDX codebase
#   - Provide guidance on ISO/SAE 21434 and CAL/TAF compliance
#   - Suggest implementations and improvements
#   - Classify and triage issues
#   - Reference REQUIREMENTS.md and methodology documentation
#
# Requirements:
#   - ANTHROPIC_API_KEY secret configured in repository settings ✅
#
# Version: 1.0.0
# Last Updated: 2026-02-12
# ============================================================================

name: Claude Issue Assistant

on:
  # Trigger when a new issue is created
  issues:
    types: [opened]
  
  # Trigger when a new comment is added to an existing issue
  issue_comment:
    types: [created]

jobs:
  claude-assistant:
    name: Claude Code Assistant
    runs-on: ubuntu-latest
    
    # Only run if the comment/issue is not from a bot (prevents infinite loops)
    if: github.actor != 'claude[bot]' && github.actor != 'github-actions[bot]'
    
    permissions:
      # Required for Claude Code action to function properly
      actions: read          # Required for Claude Code MCP server
      contents: write        # Required to create branches and commits
      issues: write          # Required to read/write issue content
      pull-requests: write   # Required to create PRs if needed
      id-token: write        # Required for OIDC token authentication
      
    steps:
      - name: Log event details
        run: |
          echo "=== Event Information ==="
          echo "Event name: ${{ github.event_name }}"
          echo "Action: ${{ github.event.action }}"
          echo "Actor: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"
          if [ "${{ github.event_name }}" = "issues" ]; then
            echo "Issue number: ${{ github.event.issue.number }}"
            echo "Issue title: ${{ github.event.issue.title }}"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "Issue number: ${{ github.event.issue.number }}"
            echo "Comment author: ${{ github.event.comment.user.login }}"
          fi
          echo "========================"

      - name: Run Claude Code Assistant
        uses: anthropics/claude-code-action@v1
        with:
          # Authentication - using Anthropic API key from repository secrets
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          
          # GitHub token for API access
          github_token: ${{ github.token }}
          
          # Optional: Use OAuth token instead of API key
          # claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          
          # Trigger phrase - only used for comments on existing issues
          # New issues always trigger automatically (via prompt below)
          trigger_phrase: "@claude"
          
          # Automatic prompt for new issues
          # For new issues: respond automatically
          # For comments: only respond if @claude is mentioned (handled by trigger_phrase)
          prompt: ${{ github.event_name == 'issues' && 'Assist with this RDX repository issue. Analyze the request, provide helpful context about the codebase, answer questions about ISO/SAE 21434, CAL/TAF, or RDX schemas. Reference relevant documentation and examples. If code changes are requested, create a branch, implement the changes, and create a PR with a clear description.' || '' }}
          
          # Advanced Claude CLI arguments
          claude_args: |
            --max-turns 15
            --model claude-sonnet-4-20250514
          
          # Optional: Custom instructions for Claude
          # This helps Claude understand the RDX project context
          # Note: CLAUDE.md in the repository root provides project-specific guidance
          
          # Optional: Include "Fix this" links in responses
          include_fix_links: true
          
          # Optional: Additional permissions (uncomment if needed)
          # additional_permissions: |
          #   actions: read
          
      - name: Log completion
        if: always()
        run: |
          echo "=== Claude Assistant Completed ==="
          echo "Status: ${{ job.status }}"
          echo "================================="

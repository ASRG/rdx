name: Claude Apply Fixes (Prompted Only)

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: claude-apply-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    # Prompt-only guards:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude apply')) ||
      (github.event_name == 'pull_request' &&
       contains(join(github.event.pull_request.labels.*.name, ','), 'claude-apply'))

    # Optional: block forks to avoid permissions/secrets surprises
    # if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Checkout (full for safe commits/reverts)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Apply Changes
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}

          allowed_bots: 'claude[bot]'

          trigger_phrase: '@claude apply'
          label_trigger: 'claude-apply'

          branch_prefix: 'claude/fixes/'
          use_sticky_comment: true
          track_progress: true

          settings: |
            {
              "review_verbosity": "concise",
              "max_changed_files": 50,
              "max_diff_bytes": 400000,
              "fail_if_no_diff": true
            }

          prompt: |
            Apply targeted changes for this PR that address reviewer-acknowledged feedback.
            Scope:
            - ONLY modify files changed in this PR unless a small adjacent edit is strictly required.
            - Keep commits small, logically separated, and clearly titled.
            Requirements:
            - Preserve CycloneDX embedding compatibility in RDX.
            - Maintain backward compatibility unless explicitly agreed; if breaking, add migration notes.
            - Update/add tests where logic changes; adjust docs if behavior changes.
            - If a fix is ambiguous or risky, post a clarifying PR comment instead of committing.
